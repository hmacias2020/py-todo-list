<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Iniciar Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            width: 100%;
            padding: 14px 24px;
            background: #fff;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #f8f9ff;
            transform: scale(1.02);
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #e74c3c;
            border: 1px solid #fcc;
            display: block;
        }

        .message.success {
            background: #f0fff4;
            color: #27ae60;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .toggle-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 TODO App</h1>
            <p id="headerSubtitle">Inicia sesión para gestionar tus tareas</p>
        </div>

        <div class="card">
            <div class="message" id="message"></div>

            <form id="authForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Tu nombre de usuario" required autocomplete="username" />
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña" required autocomplete="current-password" />
                </div>

                <button type="submit" class="btn-primary" id="btnLogin" onclick="handleLogin()">Iniciar Sesión</button>
                <button type="button" class="btn-secondary" id="btnRegister" onclick="handleRegister()">Crear Cuenta</button>
            </form>

            <div class="toggle-text" id="toggleText">
                ¿No tienes cuenta? <a onclick="toggleMode()">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let isLoginMode = true;

        // Redirect if already authenticated
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const subtitle = document.getElementById('headerSubtitle');
            const btnLogin = document.getElementById('btnLogin');
            const btnRegister = document.getElementById('btnRegister');
            const toggleText = document.getElementById('toggleText');

            if (isLoginMode) {
                subtitle.textContent = 'Inicia sesión para gestionar tus tareas';
                btnLogin.style.display = 'block';
                btnRegister.style.display = 'block';
                toggleText.innerHTML = '¿No tienes cuenta? <a onclick="toggleMode()">Regístrate aquí</a>';
            } else {
                subtitle.textContent = 'Crea una cuenta para comenzar';
                btnLogin.style.display = 'none';
                btnRegister.textContent = 'Crear Cuenta';
                btnRegister.style.display = 'block';
                toggleText.innerHTML = '¿Ya tienes cuenta? <a onclick="toggleMode()">Inicia sesión</a>';
            }
            hideMessage();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        function hideMessage() {
            const msg = document.getElementById('message');
            msg.className = 'message';
        }

        function getCredentials() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                showMessage('Por favor completa todos los campos', 'error');
                return null;
            }
            return { username, password };
        }

        async function handleLogin() {
            const creds = getCredentials();
            if (!creds) return;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(creds)
                });

                if (!response.ok) {
                    const data = await response.json();
                    showMessage(data.detail || 'Error al iniciar sesión', 'error');
                    return;
                }

                const data = await response.json();
                localStorage.setItem('token', data.access_token);
                window.location.href = '/';
            } catch (error) {
                showMessage('Error al conectar con el servidor', 'error');
            }
        }

        async function handleRegister() {
            const creds = getCredentials();
            if (!creds) return;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(creds)
                });

                if (!response.ok) {
                    const data = await response.json();
                    showMessage(data.detail || 'Error al registrarse', 'error');
                    return;
                }

                if (!isLoginMode) {
                    showMessage('¡Cuenta creada! Iniciando sesión...', 'success');
                    // Auto-login after registration
                    setTimeout(() => handleLogin(), 1000);
                } else {
                    showMessage('¡Cuenta creada exitosamente! Ahora inicia sesión.', 'success');
                }
            } catch (error) {
                showMessage('Error al conectar con el servidor', 'error');
            }
        }

        // Allow form submission with Enter key
        document.getElementById('authForm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (isLoginMode) {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });
    </script>
</body>
</html>
